<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skill Tree">
<meta name="theme-color" content="#DED5CB">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23DED5CB'/%3E%3Ccircle cx='90' cy='90' r='72' fill='%23E1FF01'/%3E%3Ccircle cx='90' cy='90' r='56' fill='%23DED5CB' opacity='0.6'/%3E%3Ctext x='90' y='105' font-family='sans-serif' font-size='48' font-weight='800' text-anchor='middle' fill='%2323262D'%3E🌳%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<title>My skill tree</title>

<!-- ============================================================
  QUICK EDIT GUIDE
  ---------------------------------------------------------------
  COLOURS      → CSS variables in the :root block below
  EXERCISES    → EXERCISES object in the CONFIG section
  REWARDS      → CHEST_AT object in the CONFIG section
  LEG EXERCISES → SQUATS / LUNGES in the CONFIG section
  SKILL NAMES / COLOURS → SKILLS array in CONFIG
  ICONS        → TREE_SVG / CHEST_SVG in CONFIG
============================================================ -->

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap');

/* ============================================================
   COLOURS
   ============================================================ */
:root {
  --color-lsit:          #E1FF01;
  --color-lsit-light:    #F5FFB3;
  --color-lsit-dark:     #B2C900;
  --color-dips:          #E1FF01;
  --color-dips-light:    #F5FFB3;
  --color-dips-dark:     #B2C900;
  --color-pushups:       #E1FF01;
  --color-pushups-light: #F5FFB3;
  --color-pushups-dark:  #B2C900;
  --color-pullups:       #E1FF01;
  --color-pullups-light: #F5FFB3;
  --color-pullups-dark:  #B2C900;

  --purple:       #C8C0E8;
  --purple-dark:  #5C4D8A;
  --pink:         #F0C8C8;
  --pink-dark:    #A83050;
  --amber:        #B2C900;
  --amber-light:  #F5FFB3;

  --bg:           #F6F2EF;   /* page background — lightest cream  */
  --surface:      #F6F2EF;   /* card surface — same as bg         */
  --surface-2:    #DED5CB;   /* secondary surface / track bg      */
  --header-bg:    #D1C5B7;   /* hero card background              */

  --text-1:       #23262D;   /* primary text             */
  --text-2:       #3A3C39;   /* secondary text           */
  --text-3:       #B8AB9C;   /* muted / hint text        */
  --text-inv:     #F6F2EF;   /* text on dark backgrounds */

  --green:        #E1FF01;
  --green-light:  #F5FFB3;
  --green-mid:    #E1FF01;
  --green-dark:   #B2C900;
  --green-deep:   #7A8A00;
  --border:       rgba(0,0,0,0.09);

  --r-sm: 12px;
  --r-lg: 22px;
  --r-xl: 28px;
  --font: 'DM Sans', -apple-system, sans-serif;
}

/* ============================================================
   BASE
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: var(--font); color: var(--text-1); min-height: 100vh; overflow-x: hidden; }
.page { display: none; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 48px; animation: fadeUp 0.22s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

/* ============================================================
   SKILL TREE PAGE
   ============================================================ */
.tree-header {
  padding: 52px 20px 12px;
  position: relative;
}
.tree-big-icon { display: none; }
.tree-title { display: none; }
.tree-back-btn {
  display: none; /* shown via JS when a level has been visited */
  background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.09);
  border: none; cursor: pointer; font-size: 14px; font-weight: 600;
  font-family: var(--font); align-items: center;
  gap: 4px; padding: 10px 18px; color: var(--text-1);
  border-radius: 99px; margin-bottom: 8px;
}
.tree-back-btn:active { transform: scale(0.93); }
/* tree page specific background */
#page-tree { background: #DED5CB; }

.tree-body { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }

/* floating hero circle — matches level page style exactly */
.tree-hero-outer {
  padding: 0px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 0;
  margin-bottom: -40px;
}
.tree-hero-wrap {
  position: relative; width: 280px; height: 280px;
  border-radius: 50%; overflow: hidden; flex-shrink: 0;
}
/* The neon tree SVG sits behind the glass */
.tree-hero-glow {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
  transition: width 0.8s ease, height 0.8s ease;
  display: flex; align-items: center; justify-content: center;
}
.tree-hero-glow svg { width: 100%; height: 100%; filter: blur(2px); }
.tree-hero-circle {
  width: 280px; height: 280px; border-radius: 50%;
  background: rgba(246, 242, 239, 0.45);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1.5px solid rgba(255,255,255,0.55);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; z-index: 2;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.tree-hero-num { font-size: 104px; font-weight: 800; letter-spacing: -4px; color: #23262D; line-height: 1; }
.tree-hero-num .of { font-size: 76px; font-weight: 600; color: #3A3C39; }
.tree-hero-sub { font-size: 18px; color: #3A3C39; margin-top: 8px; text-align: center; padding: 0 20px; line-height: 1.5; }
.tree-hero-sub strong { color: #7A8A00; }

/* reward card */
.chest-row {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 15px 16px; display: flex; align-items: center; gap: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
}
.chest-icon-box {
  width: 46px; height: 46px; border-radius: var(--r-sm);
  background: var(--green-light); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; padding: 6px;
}
.chest-icon-box svg { width: 100%; height: 100%; }
.chest-row.unlocked { background: #23262D; }
.chest-row.unlocked .chest-eye { color: #E1FF01; }
.chest-row.unlocked .chest-name { color: #F6F2EF; }
.chest-row.unlocked .chest-hint { color: rgba(255,255,255,0.5); }
.chest-row.unlocked .chest-icon-box { background: rgba(225,255,1,0.15); }
.chest-info .chest-eye { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
.chest-info .chest-name { font-size: 16px; font-weight: 700; color: var(--text-1); }
.chest-info .chest-hint { font-size: 12px; color: var(--text-2); margin-top: 1px; }

/* level card */
.tree-level-card {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 16px 18px 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  cursor: pointer;
  transition: all 0.2s; user-select: none;
}
.tree-level-card:active { transform: scale(0.98); }
.tree-level-card.is-current { background: #23262D; }
.tree-level-card.is-done { background: #23262D; }
.tree-level-title { font-size: 17px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
.tree-level-card.is-current .tree-level-title { color: #F6F2EF; }
.tree-level-card.is-done .tree-level-title { color: #F6F2EF; }
.tree-prog-label { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
.tree-level-card.is-current .tree-prog-label { color: rgba(255,255,255,0.4); }
.tree-level-card.is-done .tree-prog-label { color: rgba(255,255,255,0.4); }
.tree-dot-track {
  position: relative; height: 10px; border-radius: 99px;
  background: #DED5CB; overflow: hidden;
}
.tree-level-card.is-current .tree-dot-track,
.tree-level-card.is-done .tree-dot-track { background: rgba(255,255,255,0.12); }
.tree-dot-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 99px; background: #E1FF01; transition: width 0.5s ease;
}
.tree-dot-dots {
  position: absolute; inset: 0; display: flex; align-items: center; padding: 0 4px; pointer-events: none;
}
.tree-dot-dot { flex: 1; display: flex; align-items: center; justify-content: center; }
.tree-dot-circle { width: 4px; height: 4px; border-radius: 50%; background: rgba(0,0,0,0.22); }
.tree-level-card.is-current .tree-dot-circle,
.tree-level-card.is-done .tree-dot-circle { background: rgba(255,255,255,0.3); }
.tree-dot-circle.filled { opacity: 0; }

/* ============================================================
   LEVEL DETAIL PAGE
   ============================================================ */

/* ── Back button ── */
.lvl-back-btn {
  margin: 52px 20px 0;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: none; border-radius: 99px;
  padding: 10px 18px; font-size: 14px; font-weight: 600;
  color: var(--text-1); cursor: pointer; font-family: var(--font);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.lvl-back-btn:active { transform: scale(0.95); }

/* ── Hero header card ── */
.lvl-hero {
  margin: 16px 16px 0;
  border-radius: var(--r-xl);
  background: var(--header-bg);
  overflow: hidden;
  position: relative;
  padding: 24px 24px 24px;
  min-height: 440px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
}

/* solid colour circle centred behind frosted glass — grows with progress */
.lvl-glow {
  position: absolute;
  border-radius: 50%;
  background: #E1FF01;
  transition: width 0.8s ease, height 0.8s ease;
  pointer-events: none;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
}

/* frosted glass circle wrapper — glow sits inside this */
.lvl-circle-wrap {
  position: relative;
  width: 280px; height: 280px;
  flex-shrink: 0;
  z-index: 2;
  border-radius: 50%;
  overflow: hidden;
}
.lvl-circle-wrap .lvl-glow {
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  max-width: 280px; max-height: 280px;
}

/* frosted glass circle */
.lvl-circle {
  width: 280px; height: 280px; border-radius: 50%;
  background: rgba(246,242,239,0.45);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1.5px solid rgba(255,255,255,0.6);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; z-index: 2;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.lvl-circle-num {
  font-size: 104px; font-weight: 800; line-height: 1; letter-spacing: -4px; color: #23262D;
}
.lvl-circle-num .of { font-size: 76px; font-weight: 600; color: #3A3C39; }
.lvl-circle-sub { font-size: 18px; color: #3A3C39; margin-top: 8px; text-align: center; padding: 0 12px; line-height: 1.4; }
.lvl-circle-sub strong { color: #7A8A00; }

/* ── Level progression bars ── */
.lvl-prog-section { width: 100%; position: relative; z-index: 2; }
.lvl-prog-title { font-size: 18px; font-weight: 700; color: var(--text-1); margin-bottom: 14px; }
.prog-bar-row { margin-bottom: 14px; }
.prog-bar-row:last-child { margin-bottom: 0; }
.prog-bar-label { font-size: 14px; font-weight: 500; color: var(--text-1); margin-bottom: 6px; }
.prog-dot-track {
  position: relative; height: 14px; border-radius: 99px;
  background: #B8AB9C; display: flex; align-items: center;
  overflow: hidden;
}
.prog-dot-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 99px; background: #E1FF01;
  transition: width 0.5s ease;
  min-width: 0;
}
.prog-dots {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  padding: 0 6px;
  pointer-events: none;
}
.prog-dot {
  flex: 1; display: flex; align-items: center; justify-content: center;
}
.prog-dot-circle {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(0,0,0,0.25);
  transition: opacity 0.3s;
}
.prog-dot-circle.filled { opacity: 0; } /* hidden under the green fill */

/* ── Section cards ── */
.lvl-body { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 20px; }

.section-card {
  border-radius: var(--r-xl); padding: 20px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
}
.section-card.dark {
  background: #23262D; color: var(--text-inv);
}
.section-card.light { background: #FFFFFF; }
.section-title {
  font-size: 18px; font-weight: 700; margin-bottom: 14px;
}
.section-card.dark .section-title { color: var(--text-inv); }
.section-card.light .section-title { color: var(--text-1); }

/* ── Exercise row with ring ── */
.ex-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px; border-radius: var(--r-lg);
  margin-bottom: 8px; transition: background 0.2s;
}
.ex-row:last-child { margin-bottom: 0; }
.section-card.dark .ex-row  { background: #3A3C39; }
.section-card.light .ex-row { background: #F6F2EF; }

.ex-text { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
.section-card.dark .ex-name { color: var(--text-inv); }
.section-card.light .ex-name { color: var(--text-1); }
.ex-sub { font-size: 12px; line-height: 1.3; }
.section-card.dark .ex-sub { color: rgba(255,255,255,0.5); }
.section-card.light .ex-sub { color: var(--text-2); }

/* ── Ring ── */
.ring-wrap {
  flex-shrink: 0; width: 56px; height: 56px;
  position: relative; cursor: pointer; user-select: none;
  transition: transform 0.15s;
}
.ring-wrap:active { transform: scale(0.92); }
.ring-wrap.ring-locked { cursor: not-allowed; opacity: 0.35; pointer-events: none; }
.ring-wrap.ring-today-done { cursor: default; }
.ring-wrap svg { width: 56px; height: 56px; transform: rotate(-90deg); }
.ring-check { transform: rotate(0deg); } /* checkmark is in ring-label, not inside svg — no rotation needed */
.ring-check svg { transform: none; width: 18px; height: 18px; }
.ring-track { fill: none; stroke-width: 4; }
.section-card.dark .ring-track { stroke: rgba(255,255,255,0.12); }
.section-card.light .ring-track { stroke: var(--surface-2); }
.ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.45s cubic-bezier(0.34,1.1,0.64,1); }
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none;
}
.ring-main { font-size: 12px; font-weight: 700; line-height: 1; color: var(--text-1); }
.section-card.dark .ring-main { color: var(--text-inv); }
.ring-sub { font-size: 9px; margin-top: 1px; }
.section-card.dark .ring-sub { color: rgba(255,255,255,0.45); }
.section-card.light .ring-sub { color: var(--text-3); }
.ring-check { display: none; }
.ring-wrap.ring-done .ring-check,
.ring-wrap.ring-today-done .ring-check { display: flex; align-items: center; justify-content: center; }
.ring-wrap.ring-done .ring-main,
.ring-wrap.ring-done .ring-sub,
.ring-wrap.ring-today-done .ring-main,
.ring-wrap.ring-today-done .ring-sub { display: none; }
.ring-check svg { width: 18px; height: 18px; }

/* ── Chest on level page ── */
.lvl-chest {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 15px 16px; display: flex; align-items: center; gap: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
</style>
</head>
<body>

<!-- ═══════ TREE PAGE ═══════ -->
<div class="page active" id="page-tree">
  <div class="tree-header">
    <button class="tree-back-btn" id="tree-back-btn" onclick="backFromTree()">‹ Back</button>
  </div>
  <div id="tree-hero-area"></div>
  <div class="tree-body" id="tree-body"></div>
</div>

<!-- ═══════ LEVEL PAGE ═══════ -->
<div class="page" id="page-level">
  <button class="lvl-back-btn" onclick="goToTree()">‹ Back</button>
  <div id="lvl-hero-area"></div>
  <div class="lvl-body" id="lvl-body"></div>
</div>

<script>
// ============================================================
//  CONFIG — EDIT THIS SECTION TO CHANGE CONTENT
// ============================================================

const SKILLS = [
  { id:'lsit',    label:'L-sit',    color:'#E1FF01', colorLight:'#B2C900', colorDark:'#B2C900' },
  { id:'dips',    label:'Dips',     color:'#E1FF01', colorLight:'#B2C900', colorDark:'#B2C900' },
  { id:'pushups', label:'Push-ups', color:'#E1FF01', colorLight:'#B2C900', colorDark:'#B2C900' },
  { id:'pullups', label:'Pull-ups', color:'#E1FF01', colorLight:'#B2C900', colorDark:'#B2C900' },
];

// Level names and session counts
// sessions = number of workouts needed to complete that level
const LEVEL_META = [
  { name: 'Foundation',   sessions: 9  }, // 0.5
  { name: 'Beginner',     sessions: 12 }, // 1.0
  { name: 'Building',     sessions: 12 }, // 1.5
  { name: 'Intermediate', sessions: 12 }, // 2.0
  { name: 'Advanced',     sessions: 15 }, // 2.5
  { name: 'Elite',        sessions: 18 }, // 3.0
];

// Rest timer in seconds per level index
const REST_TIMES = [60, 60, 75, 75, 90, 90];

// One exercise per skill per level (index 0 = level 0.5, index 5 = level 3.0)
const EXERCISES = {
  lsit: [
    /* 0.5 Foundation   */ { label: 'Lying leg raises',        sub: '3×10 reps',                     note: 'Keep lower back pressed to floor' },
    /* 1.0 Beginner     */ { label: 'Seated leg raises',       sub: '3×10, hands on floor',           note: 'Sit tall, lift both legs together' },
    /* 1.5 Building     */ { label: 'Tuck L-sit hold',         sub: '3×5 sec, both knees up',         note: 'On floor, press hands down hard' },
    /* 2.0 Intermediate */ { label: 'Tuck hold on dip bar',    sub: '3×5 sec, both knees up',         note: 'Same position but on the bars' },
    /* 2.5 Advanced     */ { label: 'Single leg extension',    sub: '3×3 sec each leg',               note: 'Extend one leg at a time from tuck' },
    /* 3.0 Elite        */ { label: 'Full L-sit on bar',       sub: '3×5 sec, legs straight',         note: 'Both legs extended, hold strong' },
  ],
  dips: [
    /* 0.5 Foundation   */ { label: 'Chair dips',              sub: '3×8, bent knees, half depth',    note: 'Hands on chair edge, elbows back' },
    /* 1.0 Beginner     */ { label: 'Chair dips',              sub: '3×10, bent knees, full depth',   note: 'Lower until arms at 90°' },
    /* 1.5 Building     */ { label: 'Chair dips',              sub: '3×8, feet elevated',             note: 'Feet on sofa or second chair' },
    /* 2.0 Intermediate */ { label: 'Dead hang on dip bar',    sub: '3×10 sec, hold as long as you can — build to 30 sec', note: 'Arms straight, shoulders packed down' },
    /* 2.5 Advanced     */ { label: 'Negative dips on bar',    sub: '3×3, 5 sec descent',             note: 'Jump to top, lower as slowly as possible' },
    /* 3.0 Elite        */ { label: 'Bar dips',                sub: '3×3, full range',                note: 'Lower until shoulders below elbows' },
  ],
  pushups: [
    /* 0.5 Foundation   */ { label: 'Wall push-ups',           sub: '3×12',                           note: 'Hands shoulder-width, body straight' },
    /* 1.0 Beginner     */ { label: 'Incline push-ups',        sub: '3×8, hands on dip bar',          note: 'The higher the bar, the easier' },
    /* 1.5 Building     */ { label: 'Knee push-ups',           sub: '3×8, full depth',                note: 'Chest touches floor each rep' },
    /* 2.0 Intermediate */ { label: 'Knee push-ups',           sub: '3×6, 3 sec down',                note: 'Slow descent builds more strength' },
    /* 2.5 Advanced     */ { label: 'Full push-ups',           sub: '3×3',                            note: 'Hips level, full range of motion' },
    /* 3.0 Elite        */ { label: 'Full push-ups',           sub: '3×5',                            note: 'Control every rep, chest to floor' },
  ],
  pullups: [
    /* 0.5 Foundation   */ { label: 'Australian pull-ups',     sub: '3×6, bent knees on dip bar',     note: 'Body at angle, pull chest to bar' },
    /* 1.0 Beginner     */ { label: 'Australian pull-ups',     sub: '3×8, feet elevated',             note: 'Feet on chair — more bodyweight' },
    /* 1.5 Building     */ { label: 'Australian pull-ups',     sub: '3×6, straight legs',             note: 'Body horizontal, hardest version' },
    /* 2.0 Intermediate */ { label: 'Scapular pulls',          sub: '3×8 reps',                       note: 'Hang from bar, pull shoulder blades down without bending elbows' },
    /* 2.5 Advanced     */ { label: 'Negative pull-ups',       sub: '3×3, 5 sec descent',             note: 'Jump to top position, lower slowly' },
    /* 3.0 Elite        */ { label: 'Full pull-ups',           sub: '3×1, build to 3×3',              note: 'Dead hang start, chin over bar' },
  ],
};

const CHEST_AT = {
  1.0: { reward: 'Nice bra',       hint: 'Treat yourself — you earned it 🌸' },
  2.0: { reward: 'Running vest',   hint: 'You\'re ready to run in style 🏃‍♀️' },
  3.0: { reward: 'Yarn for a sweater', hint: 'The most expensive skein you\'ve been eyeing 🧶' },
};

// Warm-up exercises shown before every workout (not tracked toward progress)
const WARMUP = [

// ============================================================
//  ENGINE — no need to edit below this line
// ============================================================

const SETS_PER_WORKOUT = 3;
const LEVELS = [0.5, 1.0, 1.5, 2.0, 2.5, 3.0];

// Sessions per level from LEVEL_META
function totalWorkoutsForLevel(li) { return LEVEL_META[li].sessions; }
function totalSessionsForLevel(li) { return LEVEL_META[li].sessions * SETS_PER_WORKOUT; }

// State
const state = (() => { try { return JSON.parse(localStorage.getItem('cali_v15') || '{}'); } catch(e) { return {}; } })();
function save() { try { localStorage.setItem('cali_v15', JSON.stringify(state)); } catch(e) {} }

function eKey(l, s)      { return `e_${l}_${s}`; }
function legDoneKey(k)   { return `legdone_${k}`; }
function today()         { return new Date().toDateString(); }

function checkDayReset() {
  if (state._date !== today()) {
    Object.keys(state).forEach(k => { if (k.startsWith('legdone_')) delete state[k]; });
    state._leg_sq = SQUATS[Math.floor(Math.random() * SQUATS.length)].id;
    state._leg_lu = LUNGES[Math.floor(Math.random() * LUNGES.length)].id;
    state._date = today();
    save();
  }
}

function getSess(l, s)      { return state[eKey(l, s)] || 0; }
function isExDone(l, s)     { return getSess(l, s) >= totalSessionsForLevel(l); }
function workoutsDone(l, s) { return Math.floor(getSess(l, s) / SETS_PER_WORKOUT); }
function tapsInSet(l, s)    { return getSess(l, s) % SETS_PER_WORKOUT; }

function levelDone(l)       { return SKILLS.every((_, s) => isExDone(l, s)); }
function currentLvlIdx() {
  for (let i = 0; i < LEVELS.length; i++) { if (!levelDone(i)) return i; }
  return LEVELS.length - 1;
}
function levelProgress(l) {
  const minW = Math.min(...SKILLS.map((_, s) => workoutsDone(l, s)));
  const done = minW * SKILLS.length;
  const total = totalWorkoutsForLevel(l) * SKILLS.length;
  return { done, total };
}
function getTodayLegs() {
  checkDayReset();
  return {
    sq: SQUATS.find(s => s.id === state._leg_sq) || SQUATS[0],
    lu: LUNGES.find(l => l.id === state._leg_lu) || LUNGES[0],
  };
}

// ── Tap up (add one set) ──
function tapExercise(lvlIdx, si) {
  if (!isAccessible(lvlIdx) || isExDone(lvlIdx, si)) return;
  state[eKey(lvlIdx, si)] = getSess(lvlIdx, si) + 1;
  save();
  renderLevelPage(lvlIdx);
  // Start rest timer after each tap
  startRestTimer(REST_TIMES[lvlIdx]);
}

// ── Long press (remove one set) ──
function untapExercise(lvlIdx, si) {
  if (!isAccessible(lvlIdx)) return;
  const cur = getSess(lvlIdx, si);
  if (cur <= 0) return;
  state[eKey(lvlIdx, si)] = cur - 1;
  save();
  renderLevelPage(lvlIdx);
}

// ── Rest timer ──
let restTimerInterval = null;
let restTimerEl = null;

function startRestTimer(seconds) {
  if (restTimerInterval) clearInterval(restTimerInterval);
  let remaining = seconds;
  if (!restTimerEl) {
    restTimerEl = document.createElement('div');
    restTimerEl.id = 'rest-timer';
    restTimerEl.style.cssText = `
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:#23262D; color:#E1FF01; font-family:var(--font);
      font-size:15px; font-weight:700; padding:12px 28px; border-radius:99px;
      box-shadow:0 4px 20px rgba(0,0,0,0.25); z-index:999;
      display:flex; align-items:center; gap:10px; cursor:pointer;
      animation: slideUp 0.3s ease;
    `;
    document.body.appendChild(restTimerEl);
    restTimerEl.addEventListener('click', () => {
      clearInterval(restTimerInterval);
      restTimerEl.remove(); restTimerEl = null;
    });
  }
  const style = document.createElement('style');
  style.textContent = '@keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(16px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }';
  document.head.appendChild(style);

  function tick() {
    restTimerEl.innerHTML = `⏱ Rest — ${remaining}s <span style="font-size:11px;opacity:0.6;font-weight:500">tap to skip</span>`;
    if (remaining <= 0) {
      clearInterval(restTimerInterval);
      restTimerEl.innerHTML = `✓ Go again!`;
      setTimeout(() => { if (restTimerEl) { restTimerEl.remove(); restTimerEl = null; } }, 1500);
    }
    remaining--;
  }
  tick();
  restTimerInterval = setInterval(tick, 1000);
}

function tapLeg(key) {
  checkDayReset();
  const current = state[legDoneKey(key)] || 0;
  state[legDoneKey(key)] = current >= SETS_PER_WORKOUT ? 0 : current + 1;
  save();
  renderLevelPage(activeLvlIdx);
}

function isAccessible(lvlIdx) {
  return lvlIdx <= currentLvlIdx() || levelDone(lvlIdx);
}

// SVG helpers
const CHECK_W = `<svg viewBox="0 0 14 11" fill="none"><path d="M1.5 5.5L5 9L12.5 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function checkColored(c) { return `<svg viewBox="0 0 14 11" fill="none"><path d="M1.5 5.5L5 9L12.5 2" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

function makeRing(opts) {
  const { lvlIdx, si, color, colorLight, exDone, locked, dark } = opts;
  const strokeColor = dark ? color : colorLight;
  const taps = tapsInSet(lvlIdx, si);   // 0, 1, or 2 taps into current set
  const totalW = workoutsDone(lvlIdx, si);
  const totalNeeded = totalWorkoutsForLevel(lvlIdx);
  const R = 22, CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - taps / SETS_PER_WORKOUT);

  let wrapClass = 'ring-wrap';
  if (locked) wrapClass += ' ring-locked';
  if (exDone) wrapClass += ' ring-done';

  const checkSvg = dark ? CHECK_W : checkColored(colorLight);

  const label = exDone
    ? `<div class="ring-check">${checkSvg}</div>`
    : `<div class="ring-main" style="color:${dark ? '#F6F2EF' : strokeColor}">${taps > 0 ? taps + '/3' : '0/3'}</div>`;

  return `
    <div class="${wrapClass}" data-li="${lvlIdx}" data-si="${si}">
      <svg viewBox="0 0 56 56">
        <circle class="ring-track" cx="28" cy="28" r="${R}"/>
        <circle class="ring-fill" cx="28" cy="28" r="${R}"
          stroke="${strokeColor}"
          stroke-dasharray="${CIRC.toFixed(2)}"
          stroke-dashoffset="${taps > 0 ? offset.toFixed(2) : CIRC.toFixed(2)}"/>
      </svg>
      <div class="ring-label">${label}</div>
    </div>`;
}

// Navigation
let activeLvlIdx = null;

function goToLevel(i) {
  checkDayReset();
  activeLvlIdx = i;
  renderLevelPage(i);
  document.getElementById('page-tree').classList.remove('active');

  window.scrollTo(0, 0);

  renderTreePage();

  document.getElementById('page-tree').classList.add('active');
  window.scrollTo(0, 0);
}
function backFromTree() {
  goToLevel(activeLvlIdx !== null ? activeLvlIdx : currentLvlIdx());
}

  heroArea.innerHTML = `
    <div class="tree-hero-outer">
      <div class="tree-hero-wrap">
        <div class="tree-hero-glow" style="width:${treeSize}px;height:${treeSize}px">${NEON_TREE}</div>
        <div class="tree-hero-circle">
          <div class="tree-hero-num">${curDone}<span class="of">/${curTotal}</span></div>
          <div class="tree-hero-sub">${heroSub}</div>
        </div>
      </div>
    </div>`;

  // ── Levels + chests (top reward first, overlaps circle) ──
  const rev = [...LEVELS].reverse();
  rev.forEach((lvl) => {
    const li = LEVELS.indexOf(lvl);
    const done = levelDone(li);
    const isCur = li === curIdx && !done;

    // Chest card
    if (CHEST_AT[lvl]) {
      const chest = CHEST_AT[lvl];
      const unlocked = levelDone(li);
      const cc = document.createElement('div');
      cc.className = 'chest-row' + (unlocked ? ' unlocked' : '');
      cc.innerHTML = `
        <div class="chest-icon-box">${unlocked ? NEON_TREE_SVG : TREE_SVG}</div>
        <div class="chest-info">
          <div class="chest-eye">Level ${lvl.toFixed(1).replace('.0','').replace('.5','')} reward</div>
          <div class="chest-name">${unlocked ? 'Unlocked – ' + chest.reward : 'Locked'}</div>
          <div class="chest-hint">${unlocked ? chest.hint : 'Complete ' + LEVEL_META[li].name + ' to unlock'}</div>
        </div>`;
      body.appendChild(cc);
    }

    // Level card
    const avgW = SKILLS.reduce((sum, _, si) => sum + workoutsDone(li, si), 0) / SKILLS.length;
    const totalW = totalWorkoutsForLevel(li);
    const fillPct = Math.min(avgW / totalW * 100, 100);
    const dotsHTML = Array.from({length: totalW}, (_, i) => {
      const filled = i < Math.round(avgW);
      return `<div class="tree-dot-dot"><div class="tree-dot-circle${filled ? ' filled' : ''}"></div></div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'tree-level-card' + (isCur ? ' is-current' : '') + (done ? ' is-done' : '');
    card.innerHTML = `
      <div class="tree-level-title">${LEVEL_META[li].name}</div>
      <div class="tree-prog-label">Progression:</div>
      <div class="tree-dot-track">
        <div class="tree-dot-fill" style="width:${fillPct}%"></div>
        <div class="tree-dot-dots">${dotsHTML}</div>
      </div>`;
    card.onclick = () => goToLevel(li);
    body.appendChild(card);
  });

  const sp = document.createElement('div'); sp.style.height = '32px'; body.appendChild(sp);
}

// ── LEVEL PAGE ────────────────────────────────────────────
function renderLevelPage(lvlIdx) {
  checkDayReset();
  const lvl = LEVELS[lvlIdx];
  const meta = LEVEL_META[lvlIdx];
  const acc = isAccessible(lvlIdx);
  const { done, total } = levelProgress(lvlIdx);
  const isDone = levelDone(lvlIdx);

  // ── Hero area ──
  const heroArea = document.getElementById('lvl-hero-area');
  const pct = done / total;
  const glowSize = Math.min(40 + pct * 280, 280);

  const subText = isDone
    ? `${meta.name} complete! 🎉`
    : `only <strong>${total - done} sets</strong> left until<br>${meta.name} unlocks`;

  const barsHTML = SKILLS.map((sk, si) => {
    const w = workoutsDone(lvlIdx, si);
    const totalW = totalWorkoutsForLevel(lvlIdx);
    const fillPct = Math.min(w / totalW * 100, 100);
    const dotsHTML = Array.from({length: totalW}, (_, i) => {
      const filled = i < w;
      return `<div class="prog-dot"><div class="prog-dot-circle${filled ? ' filled' : ''}"></div></div>`;
    }).join('');
    return `
      <div class="prog-bar-row">
        <div class="prog-bar-label">${sk.label}</div>
        <div class="prog-dot-track">
          <div class="prog-dot-fill" style="width:${fillPct}%"></div>
          <div class="prog-dots">${dotsHTML}</div>
        </div>
      </div>`;
  }).join('');

  heroArea.innerHTML = `
    <div class="lvl-hero">
      <div class="lvl-circle-wrap">
        <div class="lvl-glow" style="width:${glowSize}px;height:${glowSize}px"></div>
        <div class="lvl-circle">
          <div class="lvl-circle-num">${done}<span class="of">/${total}</span></div>
          <div class="lvl-circle-sub">${subText}</div>
        </div>
      </div>
      <div class="lvl-prog-section">
        <div class="lvl-prog-title">Level progression — ${meta.name}</div>
        ${barsHTML}
      </div>
    </div>`;

  // ── Body ──
  const body = document.getElementById('lvl-body');
  body.innerHTML = '';

  // ── Warm-up card ──
  const wuCard = document.createElement('div');
  wuCard.className = 'section-card light';
  let wuHTML = `<div class="section-title">Warm-up</div>`;
  WARMUP.forEach(w => {
    wuHTML += `
      <div class="ex-row" style="cursor:default">
        <div class="ex-text">
          <div class="ex-name">${w.label}</div>
          <div class="ex-sub">${w.sub}</div>
        </div>
      </div>`;
  });
  wuCard.innerHTML = wuHTML;
  body.appendChild(wuCard);

  // ── Today's workout card (dark) ──
  const wkCard = document.createElement('div');
  wkCard.className = 'section-card dark';
  let wkHTML = `<div class="section-title">Today's workout</div>`;
  SKILLS.forEach((sk, si) => {
    const ex = EXERCISES[sk.id][lvlIdx];
    const locked = !acc || isExDone(lvlIdx, si);
    const exDone = isExDone(lvlIdx, si);
    wkHTML += `
      <div class="ex-row">
        <div class="ex-text">
          <div class="ex-name">${ex.label}</div>
          <div class="ex-sub">${ex.sub}</div>
          ${ex.note ? `<div class="ex-sub" style="opacity:0.5;font-style:italic">${ex.note}</div>` : ''}
        </div>
        ${makeRing({ lvlIdx, si, color: sk.color, colorLight: sk.colorLight, exDone, locked, dark: true })}
      </div>`;
  });
  wkCard.innerHTML = wkHTML;

  // Single tap = add, long press = remove
  wkCard.querySelectorAll('.ring-wrap:not(.ring-locked):not(.ring-done)').forEach(ring => {
    let pressTimer = null;
    const li = parseInt(ring.dataset.li);
    const si = parseInt(ring.dataset.si);

    ring.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        untapExercise(li, si);
      }, 500);
    });
    ring.addEventListener('pointerup', () => {
      if (pressTimer) {
        clearTimeout(pressTimer);
        pressTimer = null;
        tapExercise(li, si);
      }
    });
    ring.addEventListener('pointercancel', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });
  });
  body.appendChild(wkCard);

  // ── Next up hint ──
  if (!isDone && lvlIdx + 1 < LEVELS.length) {
    const nextMeta = LEVEL_META[lvlIdx + 1];
    const nextCard = document.createElement('div');
    nextCard.style.cssText = 'padding: 4px 4px 0; text-align:center;';
    nextCard.innerHTML = `<div style="font-size:12px;color:var(--text-3);font-style:italic">
      Next up: <strong style="color:var(--text-2)">${nextMeta.name}</strong> — 
      ${SKILLS.map(sk => EXERCISES[sk.id][lvlIdx+1].label).join(', ')}
    </div>`;
    body.appendChild(nextCard);
  }

  // ── Leg additions card (light) ──
  const legs = getTodayLegs();
  const legCard = document.createElement('div');
  legCard.className = 'section-card light';
  let legHTML = `<div class="section-title">Leg additions</div>`;
  [
    { data: legs.sq, key: 'sq', color: '#B2C900' },
    { data: legs.lu, key: 'lu', color: '#B2C900' },
  ].forEach(({ data, key, color }) => {
    const sets = state[legDoneKey(key)] || 0;
    const legDone = sets >= SETS_PER_WORKOUT;
    const R = 22, CIRC = 2 * Math.PI * R;
    const offset = CIRC * (1 - sets / SETS_PER_WORKOUT);
    const checkSvg = checkColored(color);
    legHTML += `
      <div class="ex-row" data-legkey="${key}" style="cursor:pointer">
        <div class="ex-text">
          <div class="ex-name">${data.label}</div>
          <div class="ex-sub">${data.desc}</div>
        </div>
        <div class="ring-wrap${legDone ? ' ring-today-done' : ''}">
          <svg viewBox="0 0 56 56">
            <circle class="ring-track" cx="28" cy="28" r="${R}" stroke="#D1C5B7"/>
            <circle class="ring-fill" cx="28" cy="28" r="${R}"
              stroke="${color}"
              stroke-dasharray="${CIRC.toFixed(2)}"
              stroke-dashoffset="${sets > 0 ? offset.toFixed(2) : CIRC.toFixed(2)}"/>
          </svg>
          <div class="ring-label">
            ${legDone
              ? `<div class="ring-check">${checkSvg}</div>`
              : `<div class="ring-main" style="color:${sets > 0 ? color : '#B8AB9C'}">${sets > 0 ? sets + '/3' : '0/3'}</div>`}
          </div>
        </div>
      </div>`;
  });
  legCard.innerHTML = legHTML;
  legCard.querySelectorAll('[data-legkey]').forEach(row => {
    let pressTimer = null;
    const key = row.dataset.legkey;
    row.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        // undo: go down one
        const cur = state[legDoneKey(key)] || 0;
        if (cur > 0) { state[legDoneKey(key)] = cur - 1; save(); renderLevelPage(activeLvlIdx); }
      }, 500);
    });
    row.addEventListener('pointerup', () => {
      if (pressTimer) {
        clearTimeout(pressTimer); pressTimer = null;
        tapLeg(key);
      }
    });
    row.addEventListener('pointercancel', () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });
  });
  body.appendChild(legCard);

  const sp = document.createElement('div'); sp.style.height = '20px'; body.appendChild(sp);
}

// Boot
const treeIconEl = document.getElementById('tree-big-icon');
if (treeIconEl) treeIconEl.innerHTML = TREE_SVG;
const treeIconBtn = document.getElementById('tree-icon-btn');
if (treeIconBtn) treeIconBtn.innerHTML = TREE_SVG;

// Head start — level 0.5 (Foundation) fully complete
if (!state._headstart_set) {
  const fullSessions = totalSessionsForLevel(0); // 9 × 3 = 27
  SKILLS.forEach((_, si) => {
    if (!state[eKey(0, si)]) state[eKey(0, si)] = fullSessions;
  });
  state._headstart_set = true;
  save();
}

checkDayReset();
const startIdx = currentLvlIdx();
activeLvlIdx = startIdx;
goToLevel(startIdx);
</script>
</body>
</html>
