<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My skill tree</title>

<!-- ============================================================
  QUICK EDIT GUIDE
  ---------------------------------------------------------------
  COLOURS    → Edit the CSS variables in the :root block below.
  EXERCISES  → Edit the EXERCISES object in the CONFIG section.
  REWARDS    → Edit the CHEST_AT object in the CONFIG section.
  LEG EXERCISES → Edit SQUATS / LUNGES in the CONFIG section.
  SKILL NAMES / COLOURS → Edit the SKILLS array in CONFIG.
  ICONS      → Replace the SVG code in TREE_SVG / CHEST_SVG.
============================================================ -->

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap');

/* ============================================================
   COLOURS — edit here to retheme the whole app
   ============================================================ */
:root {
  /* ── Skill colours (each skill gets its own colour) ── */
  --color-lsit:         #76A900;   /* L-sit — green          */
  --color-lsit-light:   #EEF5D0;
  --color-lsit-dark:    #4A6A00;

  --color-dips:         #F5A623;   /* Dips — amber           */
  --color-dips-light:   #FEF3DC;
  --color-dips-dark:    #B37518;

  --color-pushups:      #6B2D1E;   /* Push-ups — dark brown  */
  --color-pushups-light:#F5E8E5;
  --color-pushups-dark: #3D1208;

  --color-pullups:      #7A7A6E;   /* Pull-ups — grey        */
  --color-pullups-light:#EDEAE3;
  --color-pullups-dark: #46463D;

  /* ── Leg exercise card colours ── */
  --purple:       #C8C0E8;   /* Squats card background  */
  --purple-dark:  #5C4D8A;   /* Squats checkmark colour */
  --pink:         #F0C8C8;   /* Lunges card background  */
  --pink-dark:    #A83050;   /* Lunges checkmark colour */

  /* ── Reward chest accent ── */
  --amber:        #F5A623;
  --amber-light:  #FEF3DC;

  /* ── App backgrounds & surfaces ── */
  --bg:           #F0EEE8;   /* Page background         */
  --surface:      #FFFFFF;   /* Card background         */
  --surface-2:    #EDEAE3;   /* Secondary background    */

  /* ── Text ── */
  --text-1:       #1A1A18;   /* Primary text            */
  --text-2:       #6B6960;   /* Secondary text          */
  --text-3:       #A8A59E;   /* Muted/hint text         */

  /* ── Progress & borders ── */
  --green:        #76A900;
  --green-light:  #EEF5D0;
  --green-mid:    #BFDF6E;
  --green-dark:   #4A6A00;
  --green-deep:   #2E4200;
  --border:       rgba(0,0,0,0.09);

  /* ── Border radii ── */
  --r-sm: 12px;
  --r-lg: 22px;
  --r-xl: 28px;

  --font: 'DM Sans', -apple-system, sans-serif;
}

/* ============================================================
   APP STYLES — you generally don't need to edit below here
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:var(--font);color:var(--text-1);min-height:100vh;overflow-x:hidden;}
.page{display:none;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:48px;animation:fadeUp 0.22s ease;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tree-header{padding:56px 24px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.tree-back-btn{position:absolute;left:20px;top:52px;width:44px;height:44px;border-radius:50%;background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.09);border:none;cursor:pointer;font-size:20px;font-family:var(--font);display:flex;align-items:center;justify-content:center;}
.tree-back-btn:active{transform:scale(0.93);}
.tree-big-icon{width:72px;height:72px;}
.tree-big-icon svg{width:72px;height:72px;}
.tree-title{font-size:22px;font-weight:700;}
.tree-body{padding:0 16px;display:flex;flex-direction:column;}
.v-line{width:3px;height:18px;background:var(--border);margin:0 auto;transition:background 0.4s;}
.v-line.lit{background:var(--green-mid);}
.chest-row{background:var(--surface);border-radius:var(--r-lg);padding:15px 16px;display:flex;align-items:center;gap:13px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:2px solid transparent;transition:border-color 0.4s;}
.chest-row.unlocked{border-color:var(--amber);}
.chest-icon-box{width:46px;height:46px;border-radius:var(--r-sm);background:var(--amber-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:6px;}
.chest-icon-box svg{width:100%;height:100%;}
.chest-info .chest-eye{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:2px;}
.chest-row.unlocked .chest-eye{color:var(--amber);}
.chest-info .chest-name{font-size:16px;font-weight:700;color:var(--text-1);}
.chest-row.unlocked .chest-name{color:var(--amber);}
.chest-info .chest-hint{font-size:12px;color:var(--text-2);margin-top:1px;}
.level-row{background:var(--surface);border-radius:var(--r-lg);padding:15px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer;border:2px solid transparent;transition:border-color 0.3s,background 0.3s;user-select:none;}
.level-row:active{transform:scale(0.985);}
.level-row.current{border-color:var(--green);}
.level-row.done{border-color:var(--green);background:var(--green-light);}
.level-row-title{font-size:16px;font-weight:700;color:var(--text-1);}
.level-row.done .level-row-title{color:var(--green-deep);}
.level-dots{display:flex;gap:8px;}
.ldot{width:38px;height:38px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;transition:all 0.3s;border:2px solid transparent;}
.ldot svg{width:16px;height:16px;}
.lvl-header{padding:52px 20px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.back-btn{width:44px;height:44px;border-radius:50%;background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.09);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn:active{transform:scale(0.93);}
.lvl-header-mid{flex:1;text-align:center;padding-top:2px;}
.lvl-journey-label{font-size:14px;font-weight:500;color:var(--text-2);margin-bottom:2px;}
.lvl-big-count{font-size:68px;font-weight:800;line-height:1;letter-spacing:-2px;color:var(--text-1);}
.lvl-big-count .of{color:var(--text-3);font-weight:600;font-size:56px;}
.lvl-sub{font-size:14px;color:var(--text-2);margin-top:6px;line-height:1.45;}
.lvl-sub strong{color:var(--green-dark);}
.tree-icon-btn{width:52px;height:52px;border-radius:50%;background:var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.09);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:12px;}
.tree-icon-btn svg{width:100%;height:100%;}
.tree-icon-btn:active{transform:scale(0.93);}
.lvl-body{padding:0 16px;display:flex;flex-direction:column;gap:14px;}
.lvl-chest{background:var(--surface);border-radius:var(--r-lg);padding:15px 16px;display:flex;align-items:center;gap:13px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:2px solid transparent;transition:border-color 0.4s;}
.lvl-chest.unlocked{border-color:var(--amber);}
.skill-card{background:var(--surface);border-radius:var(--r-lg);padding:18px 16px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:2px solid transparent;transition:all 0.3s;}
.skill-card.active{border-color:var(--bg);}
.skill-card.done{border-color:var(--green);background:var(--green-light);}
.skill-card-title{font-size:18px;font-weight:700;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.skill-card.done .skill-card-title{color:var(--green-deep);border-color:var(--green-mid);}
.ex-row{margin-bottom:14px;}
.ex-row:last-child{margin-bottom:0;}
.ex-name{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:2px;}
.ex-sub{font-size:12px;color:var(--text-2);margin-bottom:6px;}
.ex-alt{color:var(--text-3);}
.sbar{height:54px;border-radius:99px;background:var(--surface-2);position:relative;cursor:pointer;overflow:visible;transition:transform 0.15s;user-select:none;display:flex;gap:4px;padding:4px;}
.sbar:active{transform:scale(0.99);}
.sbar.sbar-locked{cursor:not-allowed;opacity:0.38;pointer-events:none;}
.seg{flex:1;border-radius:99px;background:var(--surface-2);position:relative;overflow:hidden;transition:all 0.25s;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(0,0,0,0.06);}
.seg-fill{position:absolute;left:0;top:0;bottom:0;border-radius:99px;transition:width 0.35s cubic-bezier(0.34,1.2,0.64,1);}
.seg-fill.p0{width:0%}.seg-fill.p1{width:33.33%}.seg-fill.p2{width:66.66%}.seg-fill.p3{width:100%}
.seg-dot{position:relative;z-index:2;width:34px;height:34px;border-radius:50%;background:white;box-shadow:0 1px 5px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.seg.complete .seg-dot{background:rgba(255,255,255,0.92);}
.seg-dot svg{width:15px;height:15px;}
.seg-count{font-size:12px;font-weight:700;line-height:1;}
.seg.complete{border-color:transparent;}
.legs-title{font-size:20px;font-weight:700;}
.legs-row{display:flex;gap:12px;}
.leg-card{flex:1;border-radius:var(--r-lg);padding:16px 14px;min-height:134px;position:relative;cursor:pointer;user-select:none;transition:transform 0.2s;}
.leg-card:active{transform:scale(0.97);}
.leg-card.sq{background:var(--purple);}
.leg-card.lu{background:var(--pink);}
.leg-card-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.leg-card-desc{font-size:12px;color:var(--text-2);line-height:1.4;}
.leg-card-desc strong{font-weight:700;color:var(--text-1);}
.leg-check{position:absolute;bottom:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.65);display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.leg-card.checked .leg-check{background:white;box-shadow:0 1px 5px rgba(0,0,0,0.14);}
.leg-check svg{width:14px;height:14px;opacity:0.25;transition:opacity 0.2s;}
.leg-card.checked .leg-check svg{opacity:1;}
.leg-card.sq .leg-check svg{stroke:var(--purple-dark);}
.leg-card.lu .leg-check svg{stroke:var(--pink-dark);}
</style>
</head>
<body>

<div class="page active" id="page-tree">
  <div class="tree-header">
    <button class="tree-back-btn" id="tree-back-btn" onclick="backFromTree()">‹</button>
    <div class="tree-big-icon" id="tree-big-icon"></div>
    <div class="tree-title">My skill tree</div>
  </div>
  <div class="tree-body" id="tree-body"></div>
</div>

<div class="page" id="page-level">
  <div class="lvl-header">
    <button class="back-btn" onclick="goToTree()">‹</button>
    <div class="lvl-header-mid">
      <div class="lvl-journey-label">My journey</div>
      <div class="lvl-big-count" id="lc-count">0 <span class="of">/ 36</span></div>
      <div class="lvl-sub" id="lc-sub"></div>
    </div>
    <button class="tree-icon-btn" onclick="goToTree()" id="tree-icon-btn"></button>
  </div>
  <div class="lvl-body" id="lvl-body"></div>
</div>

<script>
// ============================================================

// color       = the bar fill / dot colour
// colorLight  = light tint used for backgrounds

    /* Level 1.5 */ { label: 'Dead hang',                  sub: '3×15 sec, full grip' },

    /* Level 3.0 */ { label: 'Full pull-ups',              sub: '3×1–2, unassisted' },
  ],

// ── Rewards ────────────────────────────────────────────────
// Chests appear at levels 1.0, 2.0 and 3.0
const CHEST_AT = {
  1.0: { reward: 'Pull-up bar',  hint: 'Essential for level 2 pull-up work' },
  2.0: { reward: 'Parallettes',  hint: 'Better L-sit & dip depth' },
  3.0: { reward: 'Running gear', hint: "Full kit — you've earned it" },
};

// ── Today's leg exercises ──────────────────────────────────
// One squat and one lunge is picked randomly each day from these lists
const SQUATS = [
  { id:'sq1', label:'Bodyweight squats', desc:'<strong>3×12</strong> feet shoulder-width apart' },
  { id:'sq2', label:'Squat hold',        desc:'<strong>3×20 sec</strong> deep position' },
  { id:'sq3', label:'Slow squats',       desc:'<strong>3×10</strong> 3 sec down, 1 sec hold' },
  { id:'sq4', label:'Pulse squats',      desc:'<strong>3×15</strong> pulses at bottom' },

const LUNGES = [
  { id:'lu1', label:'Stationary lunges', desc:'<strong>3×8</strong> each leg' },
  { id:'lu2', label:'Walking lunges',    desc:'<strong>3×10</strong> steps each side' },
  { id:'lu3', label:'Reverse lunges',    desc:'<strong>3×8</strong> each leg' },
  { id:'lu4', label:'Lateral lunges',    desc:'<strong>3×8</strong> each side' },
];

// ── Icons ──────────────────────────────────────────────────
// Replace the SVG code between the backticks to swap icons
const TREE_SVG = `<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80.07 75.41">

</svg>`;
const CHEST_SVG = `<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 78.99 84.65">
  <path d="M38.03,84.65H11.17c-1.79,0-3.25-1.45-3.25-3.25v-37.89c0-1.79,1.46-3.25,3.25-3.25h26.85v44.38ZM38.03,38.27H2.24c-1.23,0-2.24-1-2.24-2.23v-10.47c0-1.23,1-2.23,2.24-2.23h35.79v14.94ZM39.47,20.57l-1.39-.24c-1.64-.28-16.13-2.85-20.63-6.28-4.94-3.78-5.6-9.25-1.47-12.19C17.7.64,19.96,0,22.55,0,26.06,0,29.68,1.22,32.45,3.34c3.31,2.51,5.8,9.01,7.03,12.74,1.23-3.74,3.76-10.21,7.08-12.72C49.34,1.26,52.96.06,56.48.07c2.58,0,4.85.66,6.54,1.89,4.13,2.97,3.44,8.43-1.52,12.19-4.51,3.41-19.01,5.91-20.65,6.19l-1.39.23ZM71.07,81.41c0,1.79-1.45,3.25-3.25,3.25h-26.85v-44.38h26.85c1.8,0,3.25,1.45,3.25,3.25v37.89ZM78.99,36.04c0,1.23-1,2.23-2.24,2.23h-35.79v-14.94h35.79c1.23,0,2.24,1,2.24,2.23v10.47ZM59.27,4.8c-.85-.61-2.03-.94-3.4-.94-2.13,0-4.44.78-6.19,2.11-2.23,1.68-4.28,6.88-5.35,10.12,4.38-.86,11.36-2.5,13.59-4.18,3.02-2.28,3.62-5.47,1.35-7.11ZM29.43,5.78c-1.81-1.39-4.21-2.21-6.41-2.22-1.41,0-2.63.33-3.52.96-2.36,1.68-1.75,4.99,1.36,7.37,2.3,1.74,9.53,3.48,14.06,4.39-1.08-3.38-3.19-8.76-5.49-10.51Z" fill="#fcb92a"/>
</svg>`;

// ============================================================
//  ENGINE — no need to edit below this line
// ============================================================

const SESSIONS = 9;       // total taps to complete one exercise (3 segments × 3 taps)
const TAPS_PER_SEG = 3;   // taps per segment
const LEVELS = [0.5, 1.0, 1.5, 2.0, 2.5, 3.0];

const state = (()=>{ try { return JSON.parse(localStorage.getItem('cali_v13')||'{}'); } catch(e) { return {}; } })();
function save() { try { localStorage.setItem('cali_v13', JSON.stringify(state)); } catch(e) {} }
function eKey(l,s) { return `e_${l}_${s}`; }
function getSess(l,s) { return state[eKey(l,s)] || 0; }
function isExDone(l,s) { return getSess(l,s) >= SESSIONS; }
function segsComplete(l,s) { return Math.floor(getSess(l,s) / TAPS_PER_SEG); }
function tapsInSeg(l,s) { return getSess(l,s) % TAPS_PER_SEG; }
function levelDone(l) { return SKILLS.every((_,s) => isExDone(l,s)); }
function currentLvlIdx() { for(let i=0;i<LEVELS.length;i++) { if(!levelDone(i)) return i; } return LEVELS.length-1; }
function levelProgress(l) { let d=0; SKILLS.forEach((_,s)=>{ d+=Math.min(getSess(l,s),SESSIONS); }); return {done:d,total:SKILLS.length*SESSIONS}; }
function getTodayLegs() {
  const today = new Date().toDateString();
  if(state._leg_date !== today) {
    state._leg_date = today;
    state._leg_sq = SQUATS[Math.floor(Math.random()*SQUATS.length)].id;
    state._leg_lu = LUNGES[Math.floor(Math.random()*LUNGES.length)].id;
    save();
  }
  return { sq: SQUATS.find(s=>s.id===state._leg_sq)||SQUATS[0], lu: LUNGES.find(l=>l.id===state._leg_lu)||LUNGES[0] };
}

const CHECK_W = `<svg viewBox="0 0 14 11" fill="none"><path d="M1.5 5.5L5 9L12.5 2" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CHECK_G = `<svg viewBox="0 0 14 11" fill="none"><path d="M1.5 5.5L5 9L12.5 2" stroke="#4A6A00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function checkColored(c) { return `<svg viewBox="0 0 14 11" fill="none"><path d="M1.5 5.5L5 9L12.5 2" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

let activeLvlIdx = null;

function goToLevel(i) { activeLvlIdx=i; renderLevelPage(i); document.getElementById('page-tree').classList.remove('active'); document.getElementById('page-level').classList.add('active'); window.scrollTo(0,0); }
function goToTree() { renderTreePage(); document.getElementById('page-level').classList.remove('active'); document.getElementById('page-tree').classList.add('active'); window.scrollTo(0,0); }
function backFromTree() { goToLevel(activeLvlIdx!==null ? activeLvlIdx : currentLvlIdx()); }

function renderTreePage() {
  document.getElementById('tree-back-btn').style.display = activeLvlIdx!==null ? 'flex' : 'none';
  const body = document.getElementById('tree-body');
  body.innerHTML = '';
  const rev = [...LEVELS].reverse();
  rev.forEach((lvl, ri) => {
    const li=LEVELS.indexOf(lvl), done=levelDone(li), cur=currentLvlIdx(), isCur=li===cur&&!done;
    if(CHEST_AT[lvl]) {
      const chest=CHEST_AT[lvl], prev=LEVELS.indexOf(lvl)-1, unlocked=prev>=0?levelDone(prev):false;
      const cc=document.createElement('div'); cc.className='chest-row'+(unlocked?' unlocked':'');
      cc.innerHTML=`<div class="chest-icon-box">${CHEST_SVG}</div><div class="chest-info"><div class="chest-eye">Level ${lvl.toFixed(1).replace('.0','').replace('.5','')} reward</div><div class="chest-name">${unlocked?'Unlocked – '+chest.reward:chest.reward}</div><div class="chest-hint">${unlocked?chest.hint:'Locked – Complete all level '+(lvl-1)+' nodes to unlock'}</div></div>`;
      body.appendChild(cc);
      const ln=document.createElement('div'); ln.className='v-line'+(unlocked?' lit':''); body.appendChild(ln);
    }
    const dotsHTML = SKILLS.map((sk,si) => {
      const d=isExDone(li,si), any=getSess(li,si)>0;
      const style=d?`style="background:${sk.color};border-color:${sk.colorDark}"`:any?`style="border-color:${sk.color};background:${sk.colorLight}"`:'' ;
      return `<div class="ldot" ${style}>${d?CHECK_W:''}</div>`;
    }).join('');
    const lr=document.createElement('div'); lr.className='level-row'+(done?' done':'')+(isCur?' current':'');
    lr.innerHTML=`<div class="level-row-title">Skill level ${lvl.toFixed(1)}</div><div class="level-dots">${dotsHTML}</div>`;
    lr.onclick=()=>goToLevel(li); body.appendChild(lr);
    if(ri<rev.length-1) { const ln2=document.createElement('div'); ln2.className='v-line'+(done?' lit':''); body.appendChild(ln2); }
  });
  const sp=document.createElement('div'); sp.style.height='32px'; body.appendChild(sp);
}

function renderLevelPage(lvlIdx) {
  const lvl=LEVELS[lvlIdx], cur=currentLvlIdx(), isAcc=lvlIdx<=cur||levelDone(lvlIdx);
  const {done,total}=levelProgress(lvlIdx), isDone=levelDone(lvlIdx);
  document.getElementById('lc-count').innerHTML=`${done} <span class="of">/ ${total}</span>`;
  const sub=document.getElementById('lc-sub');
  if(isDone) { sub.innerHTML=`<strong>Level ${lvl.toFixed(1)} complete! 🎉</strong>`; }
  else { const left=total-done; sub.innerHTML=`only <strong>${left} set${left!==1?'s':''}</strong> left until level ${lvl.toFixed(1)} unlocks`; }
  const body=document.getElementById('lvl-body'); body.innerHTML='';
  if(CHEST_AT[lvl]) {
    const chest=CHEST_AT[lvl], unlocked=isDone, cc=document.createElement('div');
    cc.className='lvl-chest'+(unlocked?' unlocked':'');
    cc.innerHTML=`<div class="chest-icon-box">${CHEST_SVG}</div><div class="chest-info"><div class="chest-eye">Level ${lvl.toFixed(1).replace('.0','').replace('.5','')} reward</div><div class="chest-name">${unlocked?'Unlocked – '+chest.reward:chest.reward}</div><div class="chest-hint">${unlocked?chest.hint:'Locked – Complete all level '+lvl.toFixed(1)+' nodes to unlock'}</div></div>`;
    body.appendChild(cc);
  }
  const sc=document.createElement('div'); sc.className='skill-card'+(isDone?' done':isAcc?' active':'');
  let html=`<div class="skill-card-title">Skill level ${lvl.toFixed(1)}</div>`;
  SKILLS.forEach((sk,si) => {
    const ex=EXERCISES[sk.id][lvlIdx], exDone=isExDone(lvlIdx,si), locked=!isAcc;
    const cs=segsComplete(lvlIdx,si), inp=tapsInSeg(lvlIdx,si);
    const segsHTML=[0,1,2].map(seg => {
      const sd=seg<cs, sa=seg===cs&&!exDone, pc=sa?`p${inp}`:sd?'p3':'p0';
      let dc=''; if(sd) dc=checkColored(sk.color); else if(sa&&inp>0) dc=`<span class="seg-count" style="color:${sk.color}">${inp}/3</span>`;
      return `<div class="seg${sd?' complete':''}"><div class="seg-fill ${pc}" style="background:${sk.color}"></div><div class="seg-dot">${dc}</div></div>`;
    }).join('');
    html+=`<div class="ex-row"><div class="ex-name">${ex.label}</div><div class="ex-sub">${ex.sub}${ex.alt?` <span class="ex-alt">· ${ex.alt}</span>`:''}</div><div class="sbar ${locked?'sbar-locked':''}" data-li="${lvlIdx}" data-si="${si}">${segsHTML}</div></div>`;
  });
  sc.innerHTML=html;
  sc.querySelectorAll('.sbar:not(.sbar-locked)').forEach(bar => {
    bar.addEventListener('click', () => {
      const li=parseInt(bar.dataset.li), si=parseInt(bar.dataset.si), c=getSess(li,si);
      state[eKey(li,si)]=c>=SESSIONS?0:c+1; save(); renderLevelPage(li);
    });
  });
  body.appendChild(sc);
  const legs=getTodayLegs(), legTitle=document.createElement('div');
  legTitle.className='legs-title'; legTitle.style.padding='4px 0 4px'; legTitle.textContent="Today's leg exercises"; body.appendChild(legTitle);
  const legRow=document.createElement('div'); legRow.className='legs-row';
  [{data:legs.sq,cls:'sq',key:'lsq'},{data:legs.lu,cls:'lu',key:'llu'}].forEach(({data,cls,key}) => {
    const checked=!!state[key], card=document.createElement('div');
    card.className=`leg-card ${cls}${checked?' checked':''}`;
    card.innerHTML=`<div class="leg-card-name">${data.label}</div><div class="leg-card-desc">${data.desc}</div><div class="leg-check">${CHECK_G}</div>`;
    card.onclick=()=>{ state[key]=!state[key]; save(); renderLevelPage(lvlIdx); }; legRow.appendChild(card);
  });
  body.appendChild(legRow);
  const sp=document.createElement('div'); sp.style.height='20px'; body.appendChild(sp);
}

// Boot
document.getElementById('tree-big-icon').innerHTML = TREE_SVG;
document.getElementById('tree-icon-btn').innerHTML = TREE_SVG;
const startIdx = currentLvlIdx();
activeLvlIdx = startIdx;
goToLevel(startIdx);
</script>
</body>
</html>
